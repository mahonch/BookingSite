services:
  # Единый сервис: Backend + Frontend
  - type: web
    name: forum-booking
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/forum-date
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: forum-db
          property: connectionString
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: forum-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: forum-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: forum-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_SQL_INIT_MODE
        value: never
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "*"

databases:
  - name: forum-db
    databaseName: forum_booking
    user: forum_user
    plan: free
    region: frankfurt
