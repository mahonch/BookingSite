# Порт сервера
server.port=8080

# База данных PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/forum_booking
spring.datasource.username=postgres
spring.datasource.password=Rfvcbv123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Инициализация БД
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql
spring.jpa.defer-datasource-initialization=true

# JWT Secret Key (должен быть в переменной окружения в production)
app.jwt.secret=ForumBookingSecretKey2026ForJWTTokenGenerationAndValidation
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Логирование
logging.level.com.forum.booking=DEBUG
logging.level.org.springframework.security=DEBUG

# Профиль по умолчанию
spring.profiles.active=development
