# Production конфигурация для Docker
# Порт сервера (из переменной окружения Render)
server.port=${SERVER_PORT:8080}

# База данных PostgreSQL (из переменных окружения Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/forum_booking}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Инициализация БД (отключена на production)
spring.sql.init.mode=never

# JWT Secret Key
app.jwt.secret=${APP_JWT_SECRET:DefaultSecretKeyForDevelopmentOnly2026!}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# Логирование
logging.level.com.forum.booking=INFO
logging.level.org.springframework.security=INFO
